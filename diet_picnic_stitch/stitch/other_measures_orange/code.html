<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>قياسات الجسم - تتبع الصحة</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFA600",
                        "background-light": "#f5f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between p-4 bg-background-light dark:bg-background-dark border-b border-primary/10">
<button class="p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-primary">arrow_forward</span>
</button>
<h2 class="text-xl font-bold tracking-tight">القياسات الأخرى</h2>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="flex-1 flex flex-col gap-8 p-6 max-w-md mx-auto w-full">
<!-- Progress Bar Section -->
<div class="flex flex-col gap-3">
<div class="flex justify-between items-center">
<span class="text-sm font-medium text-primary">اكتمال الملف</span>
<p class="text-base font-bold leading-normal">70%</p>
</div>
<div class="rounded-full bg-primary/20 h-3 overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 70%;"></div>
</div>
</div>
<!-- Hip Measurement Section -->
<section class="flex flex-col gap-6">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">straighten</span>
<h3 class="text-lg font-bold leading-tight">مقاس الحوض</h3>
</div>
<div class="bg-white dark:bg-slate-800/50 p-6 rounded-xl border border-primary/5 shadow-sm">
<div class="flex justify-between items-end mb-4">
<span class="text-primary font-bold text-3xl">95</span>
<span class="text-slate-500 dark:text-slate-400 font-medium">سم</span>
</div>
<!-- Horizontal Slider Representation -->
<div class="relative w-full h-12 flex items-center">
<div class="absolute w-full h-1.5 bg-primary/20 rounded-full"></div>
<div class="absolute h-1.5 bg-primary rounded-full" style="width: 60%;"></div>
<div class="absolute left-[60%] -translate-x-1/2 flex flex-col items-center">
<div class="size-6 bg-primary rounded-full border-4 border-white dark:border-slate-800 shadow-md"></div>
</div>
<!-- Ruler Ticks -->
<div class="absolute top-8 w-full flex justify-between px-1">
<span class="text-[10px] text-slate-400">60</span>
<span class="text-[10px] text-slate-400">80</span>
<span class="text-[10px] text-primary font-bold">100</span>
<span class="text-[10px] text-slate-400">120</span>
<span class="text-[10px] text-slate-400">140</span>
</div>
</div>
</div>
</section>
<!-- Mid-arm Measurement Section -->
<section class="flex flex-col gap-6 mt-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">fitness_center</span>
<h3 class="text-lg font-bold leading-tight">مقاس وسط الذراع</h3>
</div>
<div class="bg-white dark:bg-slate-800/50 p-6 rounded-xl border border-primary/5 shadow-sm">
<div class="flex justify-between items-end mb-4">
<span class="text-primary font-bold text-3xl">32</span>
<span class="text-slate-500 dark:text-slate-400 font-medium">سم</span>
</div>
<!-- Segmented Control Style Input -->
<div class="grid grid-cols-5 gap-2">
<button class="py-3 rounded-lg bg-primary/10 border border-primary/20 text-slate-600 dark:text-slate-300 font-medium hover:bg-primary/20 transition-colors">28</button>
<button class="py-3 rounded-lg bg-primary/10 border border-primary/20 text-slate-600 dark:text-slate-300 font-medium hover:bg-primary/20 transition-colors">30</button>
<button class="py-3 rounded-lg bg-primary text-white font-bold shadow-lg shadow-primary/30 border border-primary">32</button>
<button class="py-3 rounded-lg bg-primary/10 border border-primary/20 text-slate-600 dark:text-slate-300 font-medium hover:bg-primary/20 transition-colors">34</button>
<button class="py-3 rounded-lg bg-primary/10 border border-primary/20 text-slate-600 dark:text-slate-300 font-medium hover:bg-primary/20 transition-colors">36</button>
</div>
<div class="mt-4 text-center">
<p class="text-xs text-slate-400">اختر القياس الأقرب أو استخدم المنزلق للتعديل الدقيق</p>
</div>
</div>
</section>
<!-- Illustration / Visual Aid -->
<div class="flex justify-center py-4">
<div class="w-full h-32 rounded-2xl bg-gradient-to-br from-primary/5 to-primary/20 flex items-center justify-center border border-primary/10">
<div class="flex items-center gap-8 opacity-60">
<span class="material-symbols-outlined text-5xl text-primary">accessibility_new</span>
<div class="flex flex-col gap-1">
<div class="h-1 w-12 bg-primary rounded-full"></div>
<div class="h-1 w-16 bg-primary rounded-full"></div>
<div class="h-1 w-10 bg-primary rounded-full"></div>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Actions -->
<footer class="p-6 bg-background-light dark:bg-background-dark border-t border-primary/10">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-all active:scale-95">
<span>التالي</span>
<span class="material-symbols-outlined text-xl">chevron_left</span>
</button>
</footer>
</body></html>
