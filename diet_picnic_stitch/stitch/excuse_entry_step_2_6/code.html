<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;family=Noto+Sans+Arabic:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFA600",
                        "background-light": "#fdfaf5",
                        "background-dark": "#1a160f",
                    },
                    fontFamily: {
                        "display": ["Noto Sans Arabic", "Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Noto Sans Arabic', 'Lexend', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden max-w-md mx-auto shadow-xl">
<!-- Top Navigation Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center cursor-pointer hover:bg-primary/10 rounded-full transition-colors" data-icon="arrow_forward">
<span class="material-symbols-outlined">arrow_forward</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">أدخل العذر</h2>
</div>
<!-- Progress Indicator -->
<div class="flex flex-col gap-3 p-4">
<div class="flex gap-6 justify-between items-center">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium leading-normal">الخطوة 2 من 6</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal">2/6</p>
</div>
<div class="rounded-full bg-primary/20 h-2 w-full overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 33.33%;"></div>
</div>
</div>
<!-- Main Content Section -->
<div class="flex flex-col flex-1 px-4 py-6">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight text-right pb-3 pt-4">ما هو عذرك؟</h1>
<p class="text-slate-600 dark:text-slate-400 text-base mb-6 text-right">يرجى كتابة تفاصيل العذر بوضوح ليتمكن الفريق من مراجعته.</p>
<div class="flex flex-col gap-4">
<label class="flex flex-col w-full">
<textarea class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 border border-primary/30 bg-white dark:bg-slate-800 placeholder:text-slate-400 dark:placeholder:text-slate-500 min-h-[240px] p-5 text-lg font-normal leading-relaxed shadow-sm transition-all" placeholder="اكتب عذرك هنا بالتفصيل..."></textarea>
</label>
<div class="flex items-center gap-2 p-3 bg-primary/10 rounded-lg border border-primary/20">
<span class="material-symbols-outlined text-primary">info</span>
<p class="text-sm text-slate-700 dark:text-slate-300">سيتم مراجعة طلبك خلال 24 ساعة عمل.</p>
</div>
</div>
</div>
<!-- Sticky Footer Action -->
<div class="mt-auto p-4 flex flex-col gap-3">
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 flex-1 bg-primary text-white text-lg font-bold leading-normal tracking-wide shadow-lg shadow-primary/20 hover:brightness-105 active:scale-[0.98] transition-all">
<span class="truncate">استمرار</span>
</button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-5 flex-1 bg-transparent text-slate-500 dark:text-slate-400 text-base font-medium leading-normal hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="truncate">إلغاء</span>
</button>
</div>
<!-- Background Decorations (Subtle) -->
<div class="absolute top-0 right-0 -z-10 w-64 h-64 bg-primary/5 blur-[100px] rounded-full"></div>
<div class="absolute bottom-0 left-0 -z-10 w-48 h-48 bg-primary/10 blur-[80px] rounded-full"></div>
</div>
</body></html>
