<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;family=Noto+Sans+Arabic:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFA600",
                        "background-light": "#f5f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Lexend", "Noto Sans Arabic"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Noto Sans Arabic', 'Lexend', sans-serif;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<nav class="flex items-center justify-between p-4 bg-background-light dark:bg-background-dark">
<button class="p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_forward</span>
</button>
<h1 class="text-lg font-bold">مقاس الوسط</h1>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</nav>
<!-- Progress Section -->
<div class="px-6 py-2">
<div class="flex justify-between mb-2">
<span class="text-sm font-medium text-primary">التقدم: ٤٠٪</span>
</div>
<div class="w-full bg-primary/20 h-2 rounded-full overflow-hidden">
<div class="bg-primary h-full w-[40%] rounded-full"></div>
</div>
</div>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center px-6 py-8 text-center">
<header class="mb-8">
<h2 class="text-2xl font-bold mb-2">ما هو مقاس وسطك؟</h2>
<p class="text-slate-500 dark:text-slate-400">يساعدنا هذا في تقدير نسبة الدهون في جسمك بدقة أكبر</p>
</header>
<!-- Illustration Section -->
<div class="relative w-full max-w-[280px] aspect-square mb-10 flex items-center justify-center bg-primary/5 rounded-full overflow-hidden">
<div class="flex items-center justify-center w-full h-full">
<span class="material-symbols-outlined text-primary/80" style="font-size: 140px; font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 48;">body_fat</span>
</div>
<!-- Decorative Tape Element -->
<div class="absolute inset-0 border-4 border-dashed border-primary/30 rounded-full animate-pulse"></div>
</div>
<!-- Measurement Counter -->
<div class="w-full max-w-sm bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-sm border border-primary/10">
<div class="flex items-center justify-between mb-4">
<button class="w-14 h-14 flex items-center justify-center rounded-2xl bg-primary text-white hover:bg-primary/90 transition-all active:scale-95 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
<div class="flex flex-col items-center">
<div class="flex items-baseline gap-1">
<span class="text-5xl font-bold text-slate-900 dark:text-white">٩٠</span>
<span class="text-xl font-medium text-slate-500">سم</span>
</div>
</div>
<button class="w-14 h-14 flex items-center justify-center rounded-2xl bg-primary/10 text-primary hover:bg-primary/20 transition-all active:scale-95">
<span class="material-symbols-outlined text-3xl">remove</span>
</button>
</div>
<!-- Visual Scale Indicator (Simplified Dial) -->
<div class="flex items-end justify-center gap-2 h-12">
<div class="w-1 h-4 bg-slate-300 dark:bg-slate-600 rounded-full"></div>
<div class="w-1 h-6 bg-slate-300 dark:bg-slate-600 rounded-full"></div>
<div class="w-1 h-8 bg-primary rounded-full"></div>
<div class="w-1.5 h-12 bg-primary rounded-full"></div>
<div class="w-1 h-8 bg-primary rounded-full"></div>
<div class="w-1 h-6 bg-slate-300 dark:bg-slate-600 rounded-full"></div>
<div class="w-1 h-4 bg-slate-300 dark:bg-slate-600 rounded-full"></div>
</div>
</div>
</main>
<!-- Footer Action -->
<footer class="p-6">
<button class="w-full bg-primary text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/30 flex items-center justify-center gap-2 hover:bg-primary/90 transition-all">
<span>التالي</span>
<span class="material-symbols-outlined">chevron_left</span>
</button>
<p class="text-center text-xs text-slate-400 mt-4">يمكنك تغيير هذه القياسات لاحقاً في الإعدادات</p>
</footer>
</body></html>
